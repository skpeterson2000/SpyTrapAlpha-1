<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track_My_Tracker</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --line:#262d36; --fg:#e6edf3;
    --dim:#8b949e; --high:#f85149; --med:#e3b341; --low:#39c5cf; --ok:#3fb950;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { display:flex; align-items:center; gap:16px; padding:12px 18px;
           border-bottom:1px solid var(--line); position:sticky; top:0;
           background:var(--bg); flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; letter-spacing:.5px; }
  h1 .t { color:var(--high); }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--dim);
         display:inline-block; margin-right:5px; }
  .dot.live { background:var(--ok); box-shadow:0 0 6px var(--ok); }
  .stats { display:flex; gap:18px; margin-left:auto; flex-wrap:wrap; }
  .stat b { color:var(--fg); } .stat span { color:var(--dim); }
  .controls { display:flex; gap:8px; align-items:center; }
  select { background:var(--panel); color:var(--fg); border:1px solid var(--line);
           border-radius:6px; padding:4px 6px; font:inherit; }
  main { display:grid; grid-template-columns:1.3fr 1fr; gap:14px; padding:14px; }
  @media (max-width:880px){ main{ grid-template-columns:1fr; } }
  .panel { background:var(--panel); border:1px solid var(--line);
           border-radius:10px; overflow:hidden; }
  .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px;
              color:var(--dim); margin:0; padding:10px 14px;
              border-bottom:1px solid var(--line); }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line);
          white-space:nowrap; }
  th { color:var(--dim); font-weight:normal; font-size:12px; }
  td.reason { white-space:normal; color:var(--dim); font-size:12px; }
  .badge { padding:1px 7px; border-radius:20px; font-size:11px; font-weight:bold; }
  .HIGH { color:var(--high); border:1px solid var(--high); }
  .MED  { color:var(--med);  border:1px solid var(--med); }
  .LOW  { color:var(--low);  border:1px solid var(--low); }
  .info { color:var(--dim);  border:1px solid var(--line); }
  tr.tracker td:first-child { box-shadow:inset 3px 0 0 var(--high); }
  #feed { max-height:70vh; overflow:auto; }
  .alert { padding:9px 14px; border-bottom:1px solid var(--line);
           animation:flash 1.2s ease-out; }
  .alert .top { display:flex; gap:10px; align-items:center; }
  .alert .id { color:var(--fg); } .alert .meta,.alert .reason { color:var(--dim);
           font-size:12px; }
  .alert .chans { margin-left:auto; color:var(--dim); font-size:11px; }
  @keyframes flash { from{ background:#2d333b; } to{ background:transparent; } }
  .muted { color:var(--dim); padding:14px; }
</style>
</head>
<body>
<header>
  <h1><span class="t">Track</span>_My_Tracker</h1>
  <span><span id="conn" class="dot"></span><span id="connlabel" class="muted"
        style="padding:0">connecting…</span></span>
  <div class="controls">
    <label>tier
      <select id="tier">
        <option value="info">all</option>
        <option value="LOW">LOW+</option>
        <option value="MED" selected>MED+</option>
        <option value="HIGH">HIGH</option>
      </select>
    </label>
    <label>window
      <select id="hours">
        <option value="1">1h</option>
        <option value="6">6h</option>
        <option value="24" selected>24h</option>
        <option value="168">7d</option>
      </select>
    </label>
  </div>
  <div class="stats">
    <span class="stat"><b id="s-sight">–</b> <span>sightings</span></span>
    <span class="stat"><b id="s-sess">–</b> <span>sessions</span></span>
    <span class="stat"><b id="s-alerts">–</b> <span>alerts</span></span>
    <span class="stat"><span>BLE</span> <b id="s-ble">–</b></span>
    <span class="stat"><span>SDR</span> <b id="s-sdr">–</b></span>
  </div>
</header>

<main>
  <section class="panel">
    <h2>Suspects — ranked by recurrence / threat</h2>
    <div style="overflow:auto">
      <table id="suspects">
        <thead><tr>
          <th>tier</th><th>score</th><th>radio</th><th>identity</th>
          <th>sess</th><th>span</th><th>rssi</th><th>last</th><th>why</th>
        </tr></thead>
        <tbody><tr><td colspan="9" class="muted">loading…</td></tr></tbody>
      </table>
    </div>
  </section>

  <section>
    <div class="panel" style="margin-bottom:14px">
      <h2>Live alerts <span id="livecount" class="muted" style="padding:0"></span></h2>
      <div id="feed"><div class="muted">waiting for alerts…</div></div>
    </div>
    <div class="panel">
      <h2>Tracker-class activity (survives MAC rotation)</h2>
      <table id="activity"><tbody>
        <tr><td class="muted">loading…</td></tr>
      </tbody></table>
    </div>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const fmtAgo = ts => {
  const d = Date.now()/1000 - ts;
  if (d < 90) return Math.round(d)+'s';
  if (d < 5400) return Math.round(d/60)+'m';
  if (d < 172800) return (d/3600).toFixed(1)+'h';
  return (d/86400).toFixed(1)+'d';
};
const badge = t => `<span class="badge ${t}">${t}</span>`;

async function refresh() {
  const tier = $('#tier').value, hours = $('#hours').value;
  try {
    const st = await (await fetch('/api/stats')).json();
    $('#s-sight').textContent = st.sightings.toLocaleString();
    $('#s-sess').textContent  = st.sessions;
    $('#s-alerts').textContent= st.alerts;
    $('#s-ble').textContent = (st.by_radio.ble?.sightings ?? 0).toLocaleString();
    $('#s-sdr').textContent = (st.by_radio.sdr?.sightings ?? 0).toLocaleString();

    const r = await (await fetch(
      `/api/suspects?hours=${hours}&min_tier=${tier}&top=60`)).json();
    const tb = $('#suspects tbody');
    tb.innerHTML = r.suspects.length ? '' :
      '<tr><td colspan="9" class="muted">no suspects at this tier/window</td></tr>';
    for (const s of r.suspects) {
      const tr = document.createElement('tr');
      if (s.tracker) tr.className = 'tracker';
      tr.innerHTML = `<td>${badge(s.tier)}</td><td>${s.score}</td>
        <td>${s.radio}</td><td>${s.address ?? '?'}</td>
        <td>${s.n_sessions}</td><td>${s.span_h.toFixed(1)}h</td>
        <td>${s.rssi_max ?? '–'}</td><td>${fmtAgo(s.last)} ago</td>
        <td class="reason">${(s.reasons||[]).join('; ')}</td>`;
      tb.appendChild(tr);
    }
    const at = $('#activity tbody');
    at.innerHTML = r.tracker_activity.length ? '' :
      '<tr><td class="muted">none</td></tr>';
    for (const a of r.tracker_activity) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${a.tracker}</td>
        <td>sessions <b>${a.n_sessions}</b></td>
        <td>addrs ${a.n_addrs}</td><td>${a.n} sightings</td>`;
      at.appendChild(tr);
    }
  } catch (e) { /* transient; next tick retries */ }
}

let liveN = 0;
function addAlert(a, fresh) {
  const feed = $('#feed');
  if (feed.firstChild && feed.firstChild.className === 'muted')
    feed.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'alert';
  if (!fresh) div.style.animation = 'none';
  const chans = Array.isArray(a.channels) ? a.channels.join(', ')
                                          : (a.channels || '');
  div.innerHTML = `<div class="top">${badge(a.tier)}
    <span class="id">${a.tracker || a.radio} @ ${a.identity}</span>
    <span class="chans">${chans}</span></div>
    <div class="meta">score ${a.score} · ${a.n_sessions} sessions · ${
      fmtAgo(a.ts)} ago</div>
    <div class="reason">${a.reason || ''}</div>`;
  feed.insertBefore(div, feed.firstChild);
  while (feed.children.length > 100) feed.removeChild(feed.lastChild);
  liveN++; $('#livecount').textContent = `(${liveN})`;
}

async function seedAlerts() {
  try {
    const r = await (await fetch('/api/alerts?limit=15')).json();
    r.alerts.reverse().forEach(a => addAlert(a, false));
  } catch (e) {}
}

function connectStream() {
  const es = new EventSource('/api/stream');
  es.addEventListener('ready', () => {
    $('#conn').classList.add('live'); $('#connlabel').textContent = 'live';
  });
  es.addEventListener('alert', e => addAlert(JSON.parse(e.data), true));
  es.onerror = () => {
    $('#conn').classList.remove('live');
    $('#connlabel').textContent = 'reconnecting…';   // EventSource auto-retries
  };
}

$('#tier').onchange = refresh;
$('#hours').onchange = refresh;
seedAlerts();
connectStream();
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
